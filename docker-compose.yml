version: "3.9"

services:
  memex-api:
    build: .
    container_name: memex-api
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8765:8000"
    volumes:
      - memex-data:/app/data
    environment:
      - MEMEX_DB_PATH=/app/data/memex.db
      - LITELLM_BASE_URL=http://host.docker.internal:4000
      - LITELLM_API_KEY=sk-1234
      - INNER_MODEL=claude-3-haiku-20240307
      - EMBED_MODEL=text-embedding-3-small
      - PORT=8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  memex-monitor:
    build: .
    container_name: memex-monitor
    restart: unless-stopped
    depends_on:
      memex-api:
        condition: service_healthy
    volumes:
      - memex-data:/app/data
    environment:
      - MEMEX_API_URL=http://memex-api:8000
      - MEMEX_DB_PATH=/app/data/memex.db
      - MONITOR_INTERVAL_SEC=60
      - MAX_DB_MB=500
    command: ["python", "-m", "self_healing.monitor"]

volumes:
  memex-data:

